<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EAN Answer Beach 🌊🎣</title>
  <link rel="stylesheet" href="answer-style.css">
</head>

<body>

  <!-- BACKGROUND LAYERS -->
  <div class="sky"></div>
  <div class="sea"></div>
  <div class="sand"></div>

  <!-- FLOATING OBJECTS -->
  <div class="float" style="top:20%; left:0;">🎣</div>
  <div class="float" style="top:35%; left:0;">🐟</div>
  <div class="float" style="top:55%; left:0;">🐠</div>
  <div class="float" style="top:75%; left:0;">🪸</div>

  <!-- MAIN UI -->
  <div class="container">
    <h1>🌴 EAN Answer Beach 🌊</h1>

    <input type="number" id="aNumber" placeholder="Enter question number (1–20)">
    <select id="metal">
  <option value="">Select Metal 🎣</option>
  <option value="Fe">Fe</option>
  <option value="Cu">Cu</option>
  <option value="Co">Co</option>
  <option value="Zn">Zn</option>
  <option value="Ni">Ni</option>
  <option value="Pt">Pt</option>
  <option value="Pd">Pd</option>
  <option value="Ag">Ag</option>
</select>
    <button id="btn">Reveal Answer 🎣</button>

    <div id="answerBox">
      <p id="answerText">🌊 Drop a number into the sea...</p>
    </div>
  </div>

  <script src="answer.js"></script>
</body>
</html>
