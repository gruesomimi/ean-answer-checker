<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>EAN Answer Reef 🌊🎣</title>
  <link rel="stylesheet" href="answer-style.css">
</head>

<body>

  <div class="bg"></div>
  <div class="light"></div>

  <div class="fish f1">🐠</div>
  <div class="fish f2">🐟</div>
  <div class="fish f3">🐡</div>

  <div class="container">

    <h1>🌊 Answer Fishing Zone 🎣</h1>

    <input type="number" id="aNumber" placeholder="Enter question number (1–20)">
    <button onclick="showAnswer()">Reveal Answer 🎣</button>

    <div id="answerBox">
      <p id="answerText">🫧 Cast for the answer...</p>
    </div>

  </div>

  <script src="answer.js"></script>
</body>
</html>
